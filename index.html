<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <title>Sri Basaveswara ERP</title>
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        body.dark { background-color: #1a202c; color: #e2e8f0; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .dark .card { background: #2d3748; }
    </style>
</head>
<body class="bg-gray-100 transition-colors duration-200">

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
    </div>

    <!-- Login Screen -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full card p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-blue-600">Sri Basaveswara</h2>
                <p class="text-gray-500">School Management System</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="uid" placeholder="Roll No / Email" class="w-full p-3 border rounded focus:ring-2 focus:ring-blue-500 outline-none text-black">
                <input type="password" id="pass" placeholder="Password" class="w-full p-3 border rounded focus:ring-2 focus:ring-blue-500 outline-none text-black">
                <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded font-semibold hover:bg-blue-700">Login</button>
            </div>
            <div class="mt-4 text-center text-sm text-gray-400">Default: admin@school.com / admin123</div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="hidden min-h-screen flex flex-col">
        <nav class="bg-blue-800 text-white p-4 flex justify-between items-center shadow-lg">
            <span class="font-bold text-lg">SBS ERP</span>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="hover:text-yellow-400"><i class="fas fa-moon"></i></button>
                <span id="userName" class="hidden md:inline">User</span>
                <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded text-sm hover:bg-red-600">Logout</button>
            </div>
        </nav>

        <div class="flex flex-1">
            <!-- Sidebar -->
            <aside class="w-20 md:w-64 bg-white dark:bg-gray-800 border-r shadow-sm">
                <div id="menuItems" class="p-4 space-y-2">
                    <!-- Menu dynamically injected -->
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="flex-1 p-6 overflow-y-auto" id="mainContent">
                <div id="welcomeScreen">
                    <h1 class="text-2xl font-bold mb-4">Welcome back, <span id="dashName"></span></h1>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="statsGrid">
                        <!-- Stats cards injected -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let currentUser = null;

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
        }

        async function login() {
            const uid = document.getElementById('uid').value;
            const pass = document.getElementById('pass').value;
            if(!uid || !pass) return alert("Fill all fields");

            showLoading(true);
            google.script.run.withSuccessHandler(res => {
                showLoading(false);
                if(res.success) {
                    currentUser = res.user;
                    renderDashboard();
                } else {
                    alert(res.message);
                }
            }).apiGateway({ action: 'LOGIN', payload: { uid, pass } });
        }

        function renderDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('dashName').innerText = currentUser.name;
            document.getElementById('userName').innerText = currentUser.name;
            
            const menu = document.getElementById('menuItems');
            menu.innerHTML = '';
            
            const links = [
                { name: 'Dashboard', icon: 'fas fa-home', role: 'All' },
                { name: 'Report Card', icon: 'fas fa-file-invoice', role: 'Student' },
                { name: 'Entry Marks', icon: 'fas fa-edit', role: 'Teacher' },
                { name: 'Approvals', icon: 'fas fa-check-circle', role: 'Principal' },
                { name: 'Settings', icon: 'fas fa-cog', role: 'Admin' }
            ];

            links.forEach(link => {
                if(link.role === 'All' || link.role === currentUser.role) {
                    menu.innerHTML += `
                        <button onclick="loadView('${link.name}')" class="w-full flex items-center gap-3 p-3 rounded hover:bg-blue-50 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300">
                            <i class="${link.icon} w-6"></i>
                            <span class="hidden md:inline">${link.name}</span>
                        </button>`;
                }
            });
        }

        function loadView(view) {
            const content = document.getElementById('mainContent');
            if(view === 'Approvals') {
                showLoading(true);
                google.script.run.withSuccessHandler(approvals => {
                    showLoading(false);
                    let html = `<h2 class="text-xl font-bold mb-4">Pending Approvals</h2><div class="space-y-4">`;
                    approvals.forEach(app => {
                        html += `
                            <div class="card p-4 flex justify-between items-center">
                                <div>
                                    <p class="font-bold">${app.type}</p>
                                    <p class="text-sm text-gray-500">By: ${app.requestedBy}</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="processApp('${app.id}', 'Approved')" class="bg-green-500 text-white px-3 py-1 rounded">Approve</button>
                                    <button onclick="processApp('${app.id}', 'Rejected')" class="bg-red-500 text-white px-3 py-1 rounded">Reject</button>
                                </div>
                            </div>`;
                    });
                    content.innerHTML = html + `</div>`;
                }).apiGateway({ action: 'GET_APPROVALS' });
            } else {
                content.innerHTML = `<h2 class="text-xl font-bold">${view}</h2><p class="mt-4">Feature coming soon in this module...</p>`;
            }
        }

        function logout() {
            location.reload();
        }
    </script>
</body>
</html>
